<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Nephron 3D | Immersive Intro</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      background: #071a1a;
    }

    /* Fullscreen canvas container */
    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    /* Overlay content that fades out automatically */
    .intro-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 20;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at center, rgba(10, 42, 42, 0.85) 0%, rgba(7, 26, 26, 0.95) 100%);
      backdrop-filter: blur(8px);
      transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: none; /* Let clicks pass through, but we use auto-redirect */
      animation: gentlePulse 3s infinite;
    }

    .intro-overlay.fade-out {
      opacity: 0;
    }

    .intro-title {
      text-align: center;
      animation: floatIn 1.2s ease-out;
    }

    .intro-title h1 {
      font-size: 4.5rem;
      background: linear-gradient(135deg, #FFFFFF, #3ecf8e, #6ee7b7);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 16px;
      letter-spacing: -0.02em;
    }

    .intro-title p {
      font-size: 1.3rem;
      color: #b8e4d0;
      opacity: 0.9;
      margin-bottom: 40px;
    }

    .pulse-ring {
      width: 80px;
      height: 80px;
      border: 2px solid #3ecf8e;
      border-radius: 50%;
      margin: 20px auto;
      animation: pulse 1.8s infinite;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .pulse-ring i {
      font-size: 2.5rem;
      color: #3ecf8e;
      animation: bounce 1s infinite;
    }

    .redirect-hint {
      margin-top: 30px;
      font-size: 0.95rem;
      color: #8fcbbc;
      letter-spacing: 1px;
      font-weight: 500;
      background: rgba(0,0,0,0.4);
      padding: 10px 24px;
      border-radius: 60px;
      backdrop-filter: blur(4px);
    }

    .countdown {
      margin-top: 20px;
      font-size: 1.2rem;
      font-weight: 700;
      color: #3ecf8e;
      background: rgba(0,0,0,0.5);
      padding: 8px 20px;
      border-radius: 40px;
      font-family: monospace;
      letter-spacing: 2px;
    }

    @keyframes floatIn {
      0% {
        opacity: 0;
        transform: translateY(40px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse {
      0% {
        transform: scale(0.9);
        box-shadow: 0 0 0 0 rgba(62, 207, 142, 0.7);
      }
      70% {
        transform: scale(1.1);
        box-shadow: 0 0 0 20px rgba(62, 207, 142, 0);
      }
      100% {
        transform: scale(0.9);
        box-shadow: 0 0 0 0 rgba(62, 207, 142, 0);
      }
    }

    @keyframes bounce {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(8px);
      }
    }

    @keyframes gentlePulse {
      0% { backdrop-filter: blur(8px); }
      50% { backdrop-filter: blur(12px); }
      100% { backdrop-filter: blur(8px); }
    }

    .progress-bar-container {
      width: 260px;
      height: 3px;
      background: rgba(62, 207, 142, 0.3);
      border-radius: 10px;
      margin: 25px auto 0;
      overflow: hidden;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #3ecf8e, #6ee7b7);
      border-radius: 10px;
      transition: width 0.05s linear;
    }

    @media (max-width: 768px) {
      .intro-title h1 { font-size: 2.5rem; }
      .intro-title p { font-size: 1rem; }
      .pulse-ring { width: 60px; height: 60px; }
      .pulse-ring i { font-size: 1.8rem; }
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
  <div id="canvas-container"></div>
  
  <div class="intro-overlay" id="introOverlay">
    <div class="intro-title">
      <h1><i class="fas fa-fill-drip"></i> Nephron 3D Studio</h1>
      <p>Immersive Renal Physiology Experience</p>
      <div class="pulse-ring">
        <i class="fas fa-arrow-right"></i>
      </div>
      <div class="redirect-hint">
        <i class="fas fa-sync-alt"></i> Redirecting automatically to interactive model...
      </div>
      <div class="countdown" id="countdownTimer">3.0s</div>
      <div class="progress-bar-container">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>
  </div>

  <!-- Three.js Background Script - Full 3D nephron animation -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    
    // Setup scene, camera, renderer - extracted intro animation
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x071a1a);
    scene.fog = new THREE.FogExp2(0x071a1a, 0.012);
    
    const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(4.5, 3.2, 7);
    camera.lookAt(0, 0.5, 0);
    
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    container.appendChild(renderer.domElement);
    
    // Lighting
    const ambient = new THREE.AmbientLight(0x2c3e3e);
    scene.add(ambient);
    const mainLight = new THREE.DirectionalLight(0xffffff, 1.2);
    mainLight.position.set(2, 5, 3);
    scene.add(mainLight);
    const fill = new THREE.PointLight(0x3ecf8e, 0.5);
    fill.position.set(1, 2, 2);
    scene.add(fill);
    
    // Nephron Group (detailed 3D model)
    const nephronGroup = new THREE.Group();
    
    // Glomerulus
    const glom = new THREE.Mesh(new THREE.SphereGeometry(0.6, 32, 32), new THREE.MeshStandardMaterial({ color: 0xdd4b6e, emissive: 0x441122 }));
    glom.position.set(-1.3, 1.2, 0);
    nephronGroup.add(glom);
    
    // Bowman's capsule ring
    const bowmanRing = new THREE.Mesh(new THREE.TorusGeometry(0.85, 0.05, 32, 100), new THREE.MeshStandardMaterial({ color: 0x6abf8a }));
    bowmanRing.position.set(-1.3, 1.2, 0);
    bowmanRing.rotation.x = Math.PI / 2;
    nephronGroup.add(bowmanRing);
    
    // Proximal tubule curve
    const curvePts = [new THREE.Vector3(-0.6, 0.9, 0.2), new THREE.Vector3(0, 0.7, 0.4), new THREE.Vector3(0.6, 0.3, 0.1), new THREE.Vector3(0.9, -0.2, -0.2)];
    const tubeGeo = new THREE.TubeGeometry(new THREE.CatmullRomCurve3(curvePts), 40, 0.12, 8);
    const proximalTube = new THREE.Mesh(tubeGeo, new THREE.MeshStandardMaterial({ color: 0x3aa8c7 }));
    nephronGroup.add(proximalTube);
    
    // Loop of Henle
    const loopPts = [new THREE.Vector3(0.9, -0.2, -0.2), new THREE.Vector3(1.1, -0.7, -0.1), new THREE.Vector3(0.7, -1.2, 0), new THREE.Vector3(0.1, -1.0, 0.2), new THREE.Vector3(-0.3, -0.5, 0.3)];
    const loopGeo = new THREE.TubeGeometry(new THREE.CatmullRomCurve3(loopPts), 50, 0.11, 8);
    const loopHenle = new THREE.Mesh(loopGeo, new THREE.MeshStandardMaterial({ color: 0x7dcd85 }));
    nephronGroup.add(loopHenle);
    
    scene.add(nephronGroup);
    
    // Particle system for ambiance
    const particleCount = 800;
    const particleGeo = new THREE.BufferGeometry();
    const positions = new Float32Array(particleCount * 3);
    for (let i = 0; i < particleCount; i++) {
      positions[i*3] = (Math.random() - 0.5) * 12;
      positions[i*3+1] = (Math.random() - 0.5) * 8;
      positions[i*3+2] = (Math.random() - 0.5) * 10 - 3;
    }
    particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const particlesSys = new THREE.Points(particleGeo, new THREE.PointsMaterial({ color: 0x3ecf8e, size: 0.04, transparent: true, opacity: 0.4 }));
    scene.add(particlesSys);
    
    // Decorative ring
    const orbRing = new THREE.Mesh(new THREE.TorusGeometry(1.6, 0.04, 64, 200), new THREE.MeshStandardMaterial({ color: 0x3ecf8e, emissive: 0x1a5a3a }));
    orbRing.rotation.x = Math.PI / 2;
    scene.add(orbRing);
    
    // Animation loop
    let time = 0;
    function animateIntro() {
      requestAnimationFrame(animateIntro);
      time += 0.006;
      nephronGroup.rotation.y = Math.sin(time * 0.2) * 0.2;
      nephronGroup.rotation.x = Math.sin(time * 0.15) * 0.08;
      orbRing.rotation.z += 0.003;
      particlesSys.rotation.y += 0.0008;
      camera.lookAt(0, 0.2, 0);
      renderer.render(scene, camera);
    }
    animateIntro();
    
    // Handle window resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>

  <script>
    // AUTO REDIRECT LOGIC - redirects itself to BB.html after intro animation (3 seconds)
    const overlay = document.getElementById('introOverlay');
    const countdownElement = document.getElementById('countdownTimer');
    const progressFill = document.getElementById('progressFill');
    
    let remainingSeconds = 3.0;
    let startTime = null;
    let animationFrame = null;
    
    function updateCountdownDisplay() {
      if (countdownElement) {
        countdownElement.textContent = `${remainingSeconds.toFixed(1)}s`;
      }
      if (progressFill) {
        const percent = ((3.0 - remainingSeconds) / 3.0) * 100;
        progressFill.style.width = `${Math.min(100, Math.max(0, percent))}%`;
      }
    }
    
    function performRedirect() {
      if (animationFrame) cancelAnimationFrame(animationFrame);
      
      // Add fade-out class to overlay
      if (overlay) {
        overlay.classList.add('fade-out');
        // Wait for fade animation to complete then redirect
        setTimeout(() => {
          window.location.href = 'BB.html';
        }, 1000); // Smooth fade then redirect
      } else {
        // Immediate fallback redirect
        window.location.href = 'BB.html';
      }
    }
    
    function startCountdown() {
      const startTimestamp = performance.now();
      const initialRemaining = remainingSeconds;
      
      function tick(now) {
        const elapsed = (now - startTimestamp) / 1000;
        const newRemaining = Math.max(0, initialRemaining - elapsed);
        remainingSeconds = newRemaining;
        updateCountdownDisplay();
        
        if (remainingSeconds <= 0.01) {
          // Countdown finished - redirect
          performRedirect();
          return;
        }
        
        animationFrame = requestAnimationFrame(tick);
      }
      
      animationFrame = requestAnimationFrame(tick);
    }
    
    // Start the automatic redirect countdown immediately
    startCountdown();
    
    // Optional: Also ensure that if user clicks anywhere (just to be safe, but auto redirect is primary)
    // We keep pointer-events none on overlay so that it doesn't interfere, but we still auto-redirect.
    // For safety, also add a backup timeout (just in case countdown fails)
    setTimeout(() => {
      if (overlay && !overlay.classList.contains('fade-out')) {
        performRedirect();
      }
    }, 4000);
  </script>
</body>
</html>
